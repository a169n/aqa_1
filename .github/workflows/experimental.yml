name: Experimental Engineering

on:
  workflow_dispatch:
    inputs:
      performance_profile:
        description: "Performance profile (smoke or full)"
        required: false
        default: "smoke"
      run_chaos:
        description: "Run chaos scenarios"
        required: false
        default: "true"
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inkwell_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d inkwell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start test server
        run: |
          npm run start:test:server > .tmp/perf-server.log 2>&1 &
          echo $! > .tmp/perf-server.pid
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Server failed to start"
          cat .tmp/perf-server.log
          exit 1
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_NAME: inkwell_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          JWT_ACCESS_SECRET: experimental-access-secret
          JWT_REFRESH_SECRET: experimental-refresh-secret
          UPLOAD_DIR: .tmp/uploads-test

      - name: Run performance tests
        run: |
          if [ "${{ github.event.inputs.performance_profile || 'smoke' }}" = "full" ]; then
            npm run perf:full
          else
            npm run perf:smoke
          fi
          npm run perf:summary
        env:
          PERF_BASE_URL: http://127.0.0.1:4000

      - name: Stop test server
        if: always()
        run: |
          if [ -f .tmp/perf-server.pid ]; then
            kill $(cat .tmp/perf-server.pid) || true
          fi

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-performance
          path: .tmp/qa/experimental/performance

  mutation-tests:
    runs-on: ubuntu-latest
    needs: performance-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inkwell_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d inkwell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mutation tests
        run: |
          npm run mutation:test
          npm run mutation:summary
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_NAME: inkwell_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          JWT_ACCESS_SECRET: experimental-access-secret
          JWT_REFRESH_SECRET: experimental-refresh-secret
          UPLOAD_DIR: .tmp/uploads-test

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-mutation
          path: |
            server/reports/mutation
            .tmp/qa/experimental/mutation

  chaos-tests:
    runs-on: ubuntu-latest
    needs: mutation-tests
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_chaos != 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose -f docker-compose.backend.yml up -d --build

      - name: Wait for backend health
        run: |
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.backend.yml logs
          exit 1

      - name: Run chaos scenarios
        run: npm run chaos:run
        env:
          CHAOS_BASE_URL: http://127.0.0.1:4000

      - name: Teardown backend stack
        if: always()
        run: docker compose -f docker-compose.backend.yml down -v

      - name: Upload chaos artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experimental-chaos
          path: .tmp/qa/experimental/chaos

  experimental-summary:
    runs-on: ubuntu-latest
    needs: [performance-tests, mutation-tests, chaos-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download performance artifacts
        uses: actions/download-artifact@v4
        with:
          name: experimental-performance
          path: .tmp/qa/experimental/performance

      - name: Download mutation artifacts
        uses: actions/download-artifact@v4
        with:
          name: experimental-mutation
          path: .tmp/qa/experimental/mutation-import

      - name: Download chaos artifacts
        if: ${{ needs.chaos-tests.result != 'skipped' }}
        uses: actions/download-artifact@v4
        with:
          name: experimental-chaos
          path: .tmp/qa/experimental/chaos

      - name: Restore mutation report layout
        run: |
          mkdir -p server/reports/mutation .tmp/qa/experimental/mutation
          if [ -f .tmp/qa/experimental/mutation-import/mutation-summary.json ]; then
            cp .tmp/qa/experimental/mutation-import/mutation-summary.json .tmp/qa/experimental/mutation/mutation-summary.json
          fi
          if [ -f .tmp/qa/experimental/mutation-import/mutation-report.json ]; then
            cp .tmp/qa/experimental/mutation-import/mutation-report.json server/reports/mutation/mutation-report.json
          fi

      - name: Generate experimental summary
        run: npm run experimental:summary

      - name: Upload experimental summary
        uses: actions/upload-artifact@v4
        with:
          name: experimental-summary
          path: .tmp/qa/experimental/experimental-summary.json
