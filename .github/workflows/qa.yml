name: QA Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run format check
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run lint autofix
        run: npm run lint:fix

      - name: Fail if lint autofix changed files
        run: git diff --exit-code

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

  api-tests:
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inkwell_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d inkwell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API coverage suite
        run: npm run test:coverage
        env:
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: 5432
          DATABASE_NAME: inkwell_test
          DATABASE_USER: postgres
          DATABASE_PASSWORD: postgres
          JWT_ACCESS_SECRET: ci-access-secret
          JWT_REFRESH_SECRET: ci-refresh-secret
          UPLOAD_DIR: .tmp/uploads-test

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage

      - name: Upload API QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-api-artifacts
          path: |
            .tmp/qa/vitest-report.json
            server/coverage/coverage-summary.json

  e2e:
    runs-on: ubuntu-latest
    needs: api-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: inkwell_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d inkwell_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        run: npm run test:e2e

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Upload Playwright failure output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results

      - name: Upload E2E QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-e2e-artifacts
          path: .tmp/qa/playwright-report.json

  qa-gates:
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download API QA artifacts
        uses: actions/download-artifact@v4
        with:
          name: qa-api-artifacts
          path: .tmp/qa-import/api

      - name: Download E2E QA artifacts
        uses: actions/download-artifact@v4
        with:
          name: qa-e2e-artifacts
          path: .tmp/qa-import/e2e

      - name: Restore QA artifact layout
        run: |
          mkdir -p .tmp/qa server/coverage
          cp .tmp/qa-import/api/.tmp/qa/vitest-report.json .tmp/qa/vitest-report.json
          cp .tmp/qa-import/api/server/coverage/coverage-summary.json server/coverage/coverage-summary.json
          cp .tmp/qa-import/e2e/.tmp/qa/playwright-report.json .tmp/qa/playwright-report.json

      - name: Evaluate QA quality gates
        run: npm run qa:gates

      - name: Upload QA summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-summary
          path: .tmp/qa/qa-summary.json

  docker-build:
    runs-on: ubuntu-latest
    needs: qa-gates

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -f server/Dockerfile .
