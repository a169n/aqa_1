services:
  db:
    build:
      context: .
      dockerfile: server/docker/postgres/Dockerfile
    container_name: inkwell-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: inkwell,inkwell_test
    ports:
      - '${CHAOS_DB_HOST_PORT:-15432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d inkwell']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: inkwell-backend
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - server/.env
    environment:
      NODE_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: inkwell
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      UPLOAD_DIR: uploads
    ports:
      - '${CHAOS_BACKEND_HOST_PORT:-14000}:4000'
    volumes:
      - backend_uploads:/app/server/uploads

volumes:
  postgres_data:
  backend_uploads:
