services:
  db:
    image: postgres:16-alpine
    container_name: inkwell-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: inkwell
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d inkwell']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: inkwell-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - server/.env
    environment:
      NODE_ENV: production
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: inkwell
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      UPLOAD_DIR: uploads
    ports:
      - '4000:4000'
    volumes:
      - backend_uploads:/app/server/uploads

volumes:
  postgres_data:
  backend_uploads:
